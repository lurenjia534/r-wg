name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: r-wg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: r-wg.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev \
            libfontconfig1-dev libfreetype6-dev \
            libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev \
            libxrender-dev libxfixes-dev libxext-dev libxdamage-dev \
            libegl1-mesa-dev libgl1-mesa-dev \
            libudev-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.bin }} dist/
          tar -czf r-wg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist ${{ matrix.bin }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.bin }}" dist/
          Copy-Item "target/release/wintun.dll" dist/
          Compress-Archive -Path dist/* -DestinationPath "r-wg-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: r-wg-${{ matrix.target }}
          path: r-wg-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
