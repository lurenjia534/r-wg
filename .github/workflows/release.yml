name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: r-wg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: r-wg.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            protobuf-compiler \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev \
            libfontconfig1-dev libfreetype6-dev \
            libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev \
            libxrender-dev libxfixes-dev libxext-dev libxdamage-dev \
            libegl1-mesa-dev libgl1-mesa-dev \
            libudev-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Build
        run: cargo build --release --locked

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.bin }} dist/
          tar -czf r-wg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist ${{ matrix.bin }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.bin }}" dist/
          Copy-Item "target/release/wintun.dll" dist/
          Compress-Archive -Path dist/* -DestinationPath "r-wg-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: r-wg-${{ matrix.target }}
          path: r-wg-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          awk -v header="## ${version} -" '
            $0 ~ "^" header {
              found = 1
              next
            }
            found && $0 ~ /^## / {
              exit
            }
            found {
              print
            }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Failed to find changelog entry for ${version}" >&2
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber --repo "$GH_REPO"
            gh release edit "$TAG_NAME" --notes-file RELEASE_NOTES.md --title "$TAG_NAME" --repo "$GH_REPO"
          else
            gh release create "$TAG_NAME" dist/* --notes-file RELEASE_NOTES.md --title "$TAG_NAME" --verify-tag --repo "$GH_REPO"
          fi
