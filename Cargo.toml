[package]
name = "r-wg"
version = "0.1.0"
edition = "2021"

[dependencies]
gpui = "0.2.2"
gpui-component = { version = "0.5.0", features = ["tree-sitter-languages"] }
gpui-component-assets = "0.5.0"
gotatun = { version = "0.2.0", features = ["device", "tun"] }
tokio = { version = "1.49.0", features = ["rt-multi-thread", "sync", "net", "process"] }
base64 = "0.22.1"
futures-util = "0.3"
ipnetwork = "0.21.1" # gotatun 0.2.x 的公共 Peer/Allowed IPs 类型依赖
rtnetlink = "0.20.0"
netlink-packet-route = "0.28.0"
# smallvec is included here for convenience, it is used by gpui when creating
# components that can have children. uncomment this line or
# use `cargo add smallvec` to add it to your project
#smallvec = "1.13.2"

[patch.crates-io]
# 临时补丁：ashpd 0.11.0 在 zvariant >= 5.9 的 dict key 约束下编译失败；上游修复后删除此 patch。
ashpd = { path = "vendor/ashpd" }
